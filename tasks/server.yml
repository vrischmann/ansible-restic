- name: Create the config directory
  ansible.builtin.file:
    dest: "{{ restic_conf_directory }}"
    owner: root
    group: root
    mode: "0700"
    state: directory

- name: Add the notify service template
  ansible.builtin.template:
    src: server/restic-backup-notify@.service.j2
    dest: "/etc/systemd/system/restic-backup-notify@.service"
    owner: root
    group: root
    mode: "0644"

# Per-unit artifacts (service, timer, env): one per scope x target, produced by
# the flatten_backup_targets filter. A unit carries its own env/calendar but
# shares the scope's files/excludes (named by scope_name).
- name: Add the services
  ansible.builtin.template:
    src: server/restic-backup.service.j2
    dest: "/etc/systemd/system/restic-backup-{{ item.unit_name }}.service"
    owner: root
    group: root
    mode: "0644"
  with_items: "{{ restic_backups | flatten_backup_targets }}"

- name: Add the timers
  ansible.builtin.template:
    src: restic-backup.timer.j2
    dest: "/etc/systemd/system/restic-backup-{{ item.unit_name }}.timer"
    owner: root
    group: root
    mode: "0644"
  with_items: "{{ restic_backups | flatten_backup_targets }}"

- name: Create the environment files
  ansible.builtin.template:
    src: env.j2
    dest: "{{ restic_conf_directory }}/{{ item.unit_name }}.env"
    owner: root
    group: root
    mode: "0600"
  with_items: "{{ restic_backups | flatten_backup_targets }}"

# Per-scope artifacts (files, excludes): authored once per scope and shared by
# every target of that scope.
- name: Create the files file
  ansible.builtin.template:
    src: files.j2
    dest: "{{ restic_conf_directory }}/{{ item.name }}.files"
    owner: root
    group: root
    mode: "0600"
  with_items: "{{ restic_backups }}"

- name: Create the excludes file
  ansible.builtin.template:
    src: excludes.j2
    dest: "{{ restic_conf_directory }}/{{ item.name }}.excludes"
    owner: root
    group: root
    mode: "0600"
  with_items: "{{ restic_backups }}"

- name: Create the backup notify script
  ansible.builtin.copy:
    src: restic-backup-notify.py
    dest: "/usr/local/bin/restic-backup-notify.py"
    owner: root
    group: root
    mode: "0755"

# NOTE(vincent): do _not_ start the service here or it will just execute the backup !

- name: Enable the services
  ansible.builtin.systemd:
    daemon_reload: true
    name: "restic-backup-{{ item.unit_name }}"
    enabled: true
  with_items: "{{ restic_backups | flatten_backup_targets }}"

- name: Enable the service timers
  ansible.builtin.systemd:
    daemon_reload: true
    name: "restic-backup-{{ item.unit_name }}.timer"
    enabled: true
    state: started
  with_items: "{{ restic_backups | flatten_backup_targets }}"
